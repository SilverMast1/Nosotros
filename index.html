<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosotros · Gabriel & Alexa</title>
<link rel="manifest" href="manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<!-- SDK de Firebase (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<style>
  :root {
    --bg: #0f0514;
    --bg-2: #1c0a24;
    --fg: #fbebfd;
    --muted: #a68ba7;
    --accent: #ff4a76;
    --accent-2: #ffb547;
    --accent-3: #c25f9b;
    --card: rgba(255, 255, 255, 0.035);
    --card-hover: rgba(255, 255, 255, 0.07);
    --border: rgba(255, 255, 255, 0.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Manrope', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  @media (max-width: 768px) {
    body {
      overflow-y: auto !important;
      height: auto !important;
      min-height: 100vh;
    }
  }
  .font-display { font-family: 'Fraunces', serif; font-optical-sizing: auto; }

  /* Efectos de fondo */
  .bg-effects { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; animation: float 25s ease-in-out infinite; }
  .blob-1 { width: 550px; height: 550px; background: radial-gradient(circle, var(--accent) 0%, transparent 75%); top: -100px; left: -100px; }
  .blob-2 { width: 650px; height: 650px; background: radial-gradient(circle, var(--accent-2) 0%, transparent 75%); bottom: -150px; right: -150px; animation-delay: -8s; }
  .blob-3 { width: 450px; height: 450px; background: radial-gradient(circle, var(--accent-3) 0%, transparent 75%); top: 35%; left: 35%; animation-delay: -14s; }
  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(70px, -60px) scale(1.12); }
    66% { transform: translate(-50px, 50px) scale(0.9); }
  }
  .grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /></filter><rect width='100%25' height='100%25' filter='url(%23n)' /></svg>");
  }

  /* Corazones de fondo */
  .heart-bg { position: fixed; color: var(--accent); opacity: 0; pointer-events: none; z-index: 2; animation: floatUp 8s linear forwards; }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.4) rotate(0deg); opacity: 0; }
    10% { opacity: 0.25; }
    90% { opacity: 0.25; }
    100% { transform: translateY(-120px) scale(1.3) rotate(360deg); opacity: 0; }
  }

  /* Explosión de emojis */
  .emoji-pop {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    font-size: 2.5rem;
    animation: popEmoji 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  }
  @keyframes popEmoji {
    0% { transform: translate(-50%, -50%) scale(0.5) rotate(0deg); opacity: 0; }
    15% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(var(--rot)); }
    80% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--tx), calc(var(--ty) + 120px)) scale(0.7) rotate(calc(var(--rot) * 1.5)); }
  }

  /* Glassmorphism */
  .glass {
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    transition: background 0.3s, border-color 0.3s, transform 0.3s, box-shadow 0.3s;
  }
  .glass:hover {
    background: var(--card-hover);
    border-color: rgba(255, 255, 255, 0.15);
  }

  /* Inputs y botones */
  .input {
    background: rgba(10, 3, 14, 0.6);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    width: 100%;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 74, 118, 0.18);
    background: rgba(10, 3, 14, 0.8);
  }
  .input::placeholder { color: rgba(166, 139, 167, 0.5); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #ff7354 100%);
    color: #0f0514;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(255, 74, 118, 0.15);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(255, 74, 118, 0.35);
  }
  
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 10px 20px;
    border-radius: 14px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .btn-ghost:hover {
    background: var(--card);
    border-color: var(--accent);
  }

  /* Pestañas */
  .tab {
    padding: 10px 16px;
    border-radius: 12px;
    cursor: pointer;
    color: var(--muted);
    font-weight: 600;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border: 1px solid transparent;
    white-space: nowrap;
    font-size: 13px;
    background: transparent;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--fg); background: rgba(255,255,255,0.02); }
  .tab.active {
    background: var(--card);
    color: var(--fg);
    border-color: var(--border);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
  }

  /* Emojis flotantes */
  .mood-btn {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-size: 24px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mood-btn:hover { transform: scale(1.12) translateY(-2px); border-color: var(--accent); }
  .mood-btn.selected {
    background: linear-gradient(135deg, rgba(255, 74, 118, 0.25), rgba(255, 181, 71, 0.15));
    border-color: var(--accent);
    transform: scale(1.12);
  }

  /* Tablas y listas con scroll interno */
  .inner-scroll { overflow-y: auto; padding-right: 4px; }
  .inner-scroll::-webkit-scrollbar { width: 6px; }
  .inner-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Diseños de sección a pantalla completa (no scroll) */
  .section { display: none; height: 100%; width: 100%; overflow: hidden; }
  .section.active { display: flex; flex-direction: column; animation: fadeIn 0.4s ease forwards; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: #18091f;
    border: 1px solid var(--accent);
    color: var(--fg);
    padding: 12px 24px;
    border-radius: 14px;
    z-index: 1000;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    backdrop-filter: blur(25px);
    max-width: 90vw;
    text-align: center;
    font-size: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255, 74, 118, 0.15);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 3 en Raya de Amor */
  .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; aspect-ratio: 1; max-width: 320px; margin: 0 auto; }
  .ttt-cell {
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #18091f 0%, #291233 100%);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .ttt-cell:hover { border-color: var(--accent); transform: scale(1.03); background: rgba(255, 74, 118, 0.05); }
  .ttt-cell.taken { pointer-events: none; }
  .ttt-cell.winning { background: rgba(255, 74, 118, 0.2); border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 74, 118, 0.3); }

  /* Ruleta Giratoria */
  .roulette-container { position: relative; width: 300px; height: 300px; margin: 0 auto; }
  .roulette-wheel {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 8px solid var(--bg-2);
    position: relative;
    overflow: hidden;
    transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
    box-shadow: 0 0 30px rgba(194, 95, 155, 0.2), inset 0 0 30px rgba(0,0,0,0.8);
    background: conic-gradient(
      #ff4a76 0deg 45deg,
      #903774 45deg 90deg,
      #ffb547 90deg 135deg,
      #702c63 135deg 180deg,
      #c25f9b 180deg 225deg,
      #44123b 225deg 270deg,
      #ff7354 270deg 315deg,
      #1f041b 315deg 360deg
    );
  }
  .roulette-label {
    position: absolute;
    width: 50%;
    height: 40px;
    top: 50%;
    left: 50%;
    transform-origin: 0% 50%;
    padding-left: 50px;
    font-size: 11px;
    font-weight: 700;
    color: var(--fg);
    display: flex;
    align-items: center;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
  }
  .roulette-pointer {
    position: absolute;
    top: -15px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-top: 25px solid var(--accent);
    z-index: 10;
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
  }
  .roulette-center {
    position: absolute;
    inset: 38%;
    border-radius: 50%;
    background: #18091f;
    border: 4px solid var(--border);
    z-index: 5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.6);
  }

  /* Vales de Amor Gilded */
  .ticket-card {
    background: linear-gradient(135deg, #240d2f 0%, #17071e 100%);
    border: 1px solid rgba(255, 181, 71, 0.25);
    position: relative;
    border-radius: 16px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .ticket-card::before, .ticket-card::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--bg);
    transform: translateY(-50%);
    z-index: 10;
    border: 1px solid var(--border);
  }
  .ticket-card::before { left: -7px; border-left: none; }
  .ticket-card::after { right: -7px; border-right: none; }

  /* Juego de memoria */
  .memory-card { aspect-ratio: 1; perspective: 1000px; cursor: pointer; }
  .memory-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
  .memory-card.flipped .memory-inner { transform: rotateY(180deg); }
  .memory-card.matched .memory-inner { transform: rotateY(180deg); }
  .memory-card.matched { pointer-events: none; }
  .memory-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    font-size: 2rem;
  }
  .memory-front {
    background: linear-gradient(135deg, #18091f 0%, #291233 100%);
    border: 1px solid var(--border);
  }
  .memory-back {
    background: linear-gradient(135deg, rgba(255, 74, 118, 0.18) 0%, rgba(255, 181, 71, 0.18) 100%);
    border: 1px solid var(--accent);
    transform: rotateY(180deg);
  }
  .memory-card.matched .memory-back {
    background: linear-gradient(135deg, rgba(255, 74, 118, 0.08) 0%, rgba(255, 181, 71, 0.08) 100%);
    border-color: rgba(255, 74, 118, 0.3);
    opacity: 0.55;
  }

  .love-action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 12px;
    border-radius: 18px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .love-action-btn:hover { transform: scale(1.06) translateY(-2px); }

  .blur-text { filter: blur(8px); user-select: none; pointer-events: none; }
  .blur-container { position: relative; overflow: hidden; }
  .blur-overlay {
    position: absolute;
    inset: 0;
    background: rgba(28, 10, 36, 0.7);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    text-align: center;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="bg-effects"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
<div class="grain"></div>
<div id="hearts-container"></div>

<!-- PANTALLA DE LOGIN -->
<section id="login-screen" class="relative z-10 min-h-screen flex items-center justify-center px-6 py-12">
  <div class="max-w-md w-full">
    <div class="text-center mb-10 fade-in">
      <div class="inline-flex items-center justify-center w-16 h-16 mb-6 rounded-2xl glass">
        <i data-lucide="heart" class="w-8 h-8 pulse-heart" style="color: var(--accent)"></i>
      </div>
      <h1 class="font-display text-6xl font-light tracking-tight mb-3">
        <span class="italic" style="color: var(--accent)">Nos</span><span>otros</span>
      </h1>
      <p class="text-sm" style="color: var(--muted)">Un espacio íntimo y compartido</p>
    </div>
    <div class="glass rounded-3xl p-8 fade-in-1 shadow-2xl">
      <div class="mb-5">
        <label class="block text-xs uppercase tracking-wider mb-2 font-semibold" style="color: var(--muted)">Tu nombre</label>
        <input id="login-name" type="text" class="input" placeholder="Ej: Gabriel o Alexa" maxlength="20" autocomplete="off">
      </div>
      <div class="mb-6">
        <label class="block text-xs uppercase tracking-wider mb-2 font-semibold" style="color: var(--muted)">Contraseña de vuestro espacio</label>
        <input id="login-key" type="password" class="input key-mono" placeholder="••••••••" maxlength="14" autocomplete="off">
        <p class="text-xs mt-2" style="color: var(--muted)">Introduce la contraseña compartida para sincronizaros.</p>
      </div>
      <button id="login-btn" onclick="handleLogin(document.getElementById('login-name').value, document.getElementById('login-key').value)" class="btn-primary w-full shadow-lg">Entrar a nuestro espacio</button>
    </div>
  </div>
</section>


<script>
// Error catcher global para depuración
window.onerror = function(message, source, lineno, colno, error) {
  const errorMsg = "ERROR DETECTADO:\n" + message + "\nEn: " + source + "\nLínea: " + lineno + "\nColumna: " + colno + "\nDetalle: " + (error ? error.stack : 'Ninguno');
  console.error(errorMsg);
  alert(errorMsg);
  return false;
};

// ===== DATOS Y CONSTANTES =====
const SESSION_KEY = 'nosotros_app_session_ga';

function saveSession(user, key) { localStorage.setItem(SESSION_KEY, JSON.stringify({ user, key })); }
function getSession() { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); }
function clearSession() { localStorage.removeItem(SESSION_KEY); }

// ===== LOGIN =====
function handleLogin(name, key) {
  if (!name || !key) return showToast('Completa todos los campos');
  name = name.trim().charAt(0).toUpperCase() + name.trim().slice(1).toLowerCase();
  key = key.trim();

  if (name !== 'Gabriel' && name !== 'Alexa') {
    return showToast('El nombre debe ser Gabriel o Alexa');
  }
  if (key !== '230426') {
    return showToast('Contraseña incorrecta');
  }

  let role = (name === 'Gabriel') ? 'user1' : 'user2';
  saveSession({ name, role }, key);
  
  // Redirigir a la página de la aplicación
  window.location.href = 'inicio.html';
}

function showToast(message, duration = 3000) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  
  const el = document.createElement('div');
  el.className = "px-4 py-2.5 rounded-2xl glass text-xs font-medium text-white shadow-xl flex items-center gap-2 border border-white/10 animate-fade-in";
  el.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5" style="color: var(--accent)"></i> <span>${message}</span>`;
  container.appendChild(el);
  
  if (typeof lucide !== 'undefined') lucide.createIcons();
  
  setTimeout(() => {
    el.classList.replace('animate-fade-in', 'animate-fade-out');
    setTimeout(() => el.remove(), 500);
  }, duration);
}

// ===== EVENTOS DOM =====
document.addEventListener('DOMContentLoaded', () => {
  // Redirigir si ya tiene sesión activa
  const session = getSession();
  if (session && session.user && session.key === '230426') {
    window.location.replace('inicio.html');
    return;
  }

  if (typeof lucide !== 'undefined') lucide.createIcons();
  
  // Login click
  document.getElementById('login-btn').addEventListener('click', () => {
    handleLogin(document.getElementById('login-name').value, document.getElementById('login-key').value);
  });
  
  // Enter key support
  ['login-name', 'login-key'].forEach(id => {
    document.getElementById(id).addEventListener('keypress', (e) => {
      if (e.key === 'Enter') document.getElementById('login-btn').click();
    });
  });
});
</script>


<div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2 pointer-events-none"></div>
</body>
</html>
